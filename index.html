<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบจำลองผลกระทบน้ำผิวดินต่อกำแพงกันดิน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            max-width: 800px;
            width: 100%;
        }
        canvas {
            background-color: #d1ecf1; /* สีท้องฟ้าอึมครึม */
            border: 1px solid #ced4da;
            border-radius: 8px;
            display: block;
            margin: 0 auto 20px auto;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #495057;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            cursor: pointer;
            font-family: inherit;
        }
        .status-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #343a40; margin-top: 0;">แบบจำลองการกัดเซาะใต้ถนนจากท่อระบายน้ำชำรุด</h2>
    
    <canvas id="simCanvas" width="700" height="400"></canvas>

    <div class="controls">
        <div class="control-group">
            <label for="rainLevel">ปริมาณฝนสะสมบนถนน: <span id="rainValText">0</span>%</label>
            <input type="range" id="rainLevel" min="0" max="100" value="0">
        </div>
        <div class="control-group">
            <label for="pipeStatus">สภาพท่อระบายน้ำถนน:</label>
            <select id="pipeStatus">
                <option value="intact">สมบูรณ์ (น้ำไหลลงสระปกติ)</option>
                <option value="broken">ชำรุด/รั่ว (น้ำซึมลงดินหลังกำแพง)</option>
            </select>
        </div>
    </div>

    <div id="statusPanel" class="status-panel safe">
        สถานะ: ปลอดภัย (ดินแห้ง โครงสร้างมั่นคง)
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const rainLevelSlider = document.getElementById('rainLevel');
    const rainValText = document.getElementById('rainValText');
    const pipeStatusSelect = document.getElementById('pipeStatus');
    const statusPanel = document.getElementById('statusPanel');

    // โครงสร้างพื้นฐาน
    const wallX = 250;
    const wallY = 320; // ฐานล่าง
    const stemHeight = 180;
    const roadY = wallY - stemHeight; // ระดับถนนด้านบน
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ค่าจากผู้ใช้
        let rainInt = parseInt(rainLevelSlider.value);
        let isBroken = pipeStatusSelect.value === 'broken';
        
        // การคำนวณความเสียหาย
        let soilSaturation = isBroken ? (rainInt / 100) : 0;
        let voidRadius = isBroken ? (rainInt * 0.8) : 0; // ขนาดโพรงแปรผันตามฝนถ้ารั่ว
        let isCollapsed = isBroken && rainInt > 75; // จุดวิกฤตพังทลาย

        // อัปเดตข้อความและสถานะ
        rainValText.innerText = rainInt;
        
        if (isCollapsed) {
            statusPanel.className = "status-panel danger";
            statusPanel.innerHTML = "🚨 วิกฤต: เกิดโพรงขนาดใหญ่ ถนนทรุด และกำแพงพลิกคว่ำ!";
        } else if (isBroken && rainInt > 30) {
            statusPanel.className = "status-panel warning";
            statusPanel.innerHTML = "⚠️ ระวัง: น้ำรั่วซึมลงดิน เกิดการกัดเซาะ (Piping) และโพรงใต้ถนน";
        } else {
            statusPanel.className = "status-panel safe";
            statusPanel.innerHTML = isBroken && rainInt > 0 ? "สังเกตการณ์: เริ่มมีน้ำรั่วซึมลงผิวดิน" : "สถานะ: ปลอดภัย ระบบระบายน้ำทำงานปกติ";
        }

        // --- วาดพื้นหลัง ---
        
        // น้ำในสระ (ซ้ายมือ)
        ctx.fillStyle = "rgba(23, 162, 184, 0.6)";
        ctx.fillRect(0, roadY + 50, wallX, canvas.height);

        // ชั้นดินแข็งด้านล่าง
        ctx.fillStyle = "#6d4c41";
        ctx.fillRect(0, wallY, canvas.width, canvas.height - wallY);

        // --- วาดชั้นดินหลังกำแพง (เปลี่ยนสีตามความชื้น) ---
        ctx.save();
        // สร้าง clipping region เพื่อให้โพรงตัดเนื้อดินออกไป
        ctx.beginPath();
        ctx.rect(wallX + 20, roadY, canvas.width, wallY - roadY);
        if (isBroken && rainInt > 0) {
            // ตัดโพรงวงกลมใต้ถนน
            ctx.arc(wallX + 120, roadY + 30, voidRadius, 0, Math.PI * 2, true);
        }
        ctx.clip();

        // สีดิน: ปกติสีน้ำตาลอ่อน ถ้าน้ำรั่วสีจะเข้มขึ้น (อุ้มน้ำ)
        let r = 161 - (soilSaturation * 60);
        let g = 136 - (soilSaturation * 60);
        let b = 127 - (soilSaturation * 60);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(wallX + 20, roadY, canvas.width, wallY - roadY);
        ctx.restore();

        // --- แอนิเมชันน้ำและรอยรั่ว ---
        if (rainInt > 0) {
            // ฝนตก
            ctx.fillStyle = "rgba(0, 0, 255, 0.3)";
            for(let i=0; i<rainInt; i++) {
                ctx.fillRect(wallX + Math.random()*400, Math.random()*roadY, 2, 10);
            }

            if (!isBroken) {
                // ท่อปกติ: น้ำพุ่งออกจากกำแพงลงสระ
                ctx.fillStyle = "rgba(0, 150, 255, 0.8)";
                ctx.beginPath();
                ctx.moveTo(wallX, roadY + 20);
                ctx.lineTo(wallX - 30 - (rainInt/2), roadY + 50);
                ctx.lineTo(wallX, roadY + 40);
                ctx.fill();
            } else {
                // ท่อรั่ว: น้ำไหลลงใต้ดิน
                ctx.fillStyle = "rgba(0, 100, 255, 0.6)";
                ctx.beginPath();
                ctx.moveTo(wallX + 80, roadY + 15);
                ctx.lineTo(wallX + 120, roadY + 40 + (rainInt/2));
                ctx.lineTo(wallX + 150, roadY + 15);
                ctx.fill();

                // เอฟเฟกต์ Piping (โคลนทะลักออกใต้กำแพง)
                if (rainInt > 40 && !isCollapsed) {
                    ctx.fillStyle = "#5d4037"; // สีโคลน
                    ctx.fillRect(wallX - 20, wallY - 10, 20 + (rainInt/3), 10);
                    ctx.font = "12px Tahoma";
                    ctx.fillStyle = "red";
                    ctx.fillText("ดินไหลรอดใต้กำแพง (Piping)", wallX - 150, wallY - 15);
                }
            }
        }

        // --- วาดโครงสร้าง (รับการพังทลาย) ---
        ctx.save();
        
        // ถ้าถึงจุดวิกฤต กำแพงและถนนจะเคลื่อนที่ (พังทลาย)
        let roadDrop = 0;
        if (isCollapsed) {
            // กำแพงพลิกคว่ำ
            ctx.translate(wallX, wallY);
            ctx.rotate(-0.35); // เอียงซ้าย
            ctx.translate(-wallX, -wallY);
            roadDrop = 40; // ถนนทรุดลงไปในโพรง
            
            ctx.fillStyle = "red";
            ctx.font = "bold 18px Tahoma";
            ctx.fillText("💥 โครงสร้างวิบัติ!", wallX - 120, wallY - 100);
        }

        // วาดกำแพงกันดิน (L-Shape)
        ctx.fillStyle = "#adb5bd";
        ctx.strokeStyle = "#495057";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(wallX, wallY - stemHeight, 20, stemHeight); // ผนัง
        ctx.rect(wallX, wallY, 120, 20); // ฐาน
        ctx.fill(); ctx.stroke();

        ctx.restore(); // คืนค่าแกนหมุนให้กำแพง

        // วาดถนน (ชิ้นนี้จะทรุดลงถ้าพัง)
        ctx.fillStyle = "#6c757d";
        ctx.fillRect(wallX + 20, roadY + roadDrop, canvas.width, 15);

        // วาดท่อระบายน้ำริมถนน (ท่อพลาสติก/เหล็ก)
        ctx.fillStyle = "#ced4da";
        ctx.strokeStyle = "#343a40";
        ctx.beginPath();
        ctx.rect(wallX + 40, roadY - 10 + roadDrop, 80, 10);
        ctx.fill(); ctx.stroke();
        
        if (isBroken) {
            // วาดรอยแตกที่ท่อ
            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(wallX + 80, roadY - 10 + roadDrop);
            ctx.lineTo(wallX + 90, roadY + roadDrop);
            ctx.stroke();
        }
    }

    // Event Listeners
    rainLevelSlider.addEventListener('input', draw);
    pipeStatusSelect.addEventListener('change', draw);

    // Initial Draw
    draw();
</script>

</body>
</html>
